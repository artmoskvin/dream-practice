# Base experiment config. Everything that could confound a comparison
# between conditions C0–C5 lives here and is shared.

policy:
  model_name: Qwen/Qwen2.5-7B-Instruct
  max_new_tokens: 48
  temperature: 0.7          # sampling temp for rollout groups; eval is greedy
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  max_context_tokens: 4096

env:
  max_steps: 15

# Task selection: mix of difficulties, verified to have headroom for the
# base policy (week-1 job: run C0 and confirm 10–70% base success — tasks
# outside that band have no measurable learning signal at 40 eval seeds).
tasks:
  train_families:            # exploration + dreaming happen here
    - click-button
    - click-checkboxes
    - click-option
    - enter-text
    - enter-password
    - login-user
    - click-tab-2
    - email-inbox-delete
  heldout_families:          # never explored, never dreamed — pure transfer
    - click-checkboxes-large
    - email-inbox-forward
    - login-user-popup
    - enter-text-dynamic

seeds:
  exploration: [1000, 1001, 1002, 1003, 1004, 1005, 1006, 1007, 1008, 1009,
                1010, 1011, 1012, 1013, 1014, 1015, 1016, 1017, 1018, 1019,
                1020, 1021, 1022, 1023, 1024]   # sliced to budget B
  eval: [9000, 9001, 9002, 9003, 9004, 9005, 9006, 9007, 9008, 9009,
         9010, 9011, 9012, 9013, 9014, 9015, 9016, 9017, 9018, 9019,
         9020, 9021, 9022, 9023, 9024, 9025, 9026, 9027, 9028, 9029,
         9030, 9031, 9032, 9033, 9034, 9035, 9036, 9037, 9038, 9039]
  training_run_seeds: [0, 1, 2]   # 3 seeds per condition for CIs

budgets:
  real_episodes_B: [5, 10, 25, 50]

grpo:
  group_size: 8
  lr: 1.0e-5
  grad_accum_groups: 2
  max_grad_norm: 1.0
  updates: 200

simulator:
  s_llm:
    provider_model: "<your API model here>"   # keep FIXED across all runs
    retrieval_k: 4
    transition_noise_p: 0.0    # Phase-2 sweep: [0.0, 0.1, 0.2, 0.4, 0.6]
  dreamed_episodes_per_family: 400
